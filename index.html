<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BTC 韭菜生存戰</title>
    <style>
        :root {
            --up-color: #00c087;
            --down-color: #ff3b30;
            --bg-color: #121212;
            --card-bg: #1e1e1e;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: white;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }
        /* 頂部資產欄 */
        .header {
            padding: 20px;
            background: var(--card-bg);
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid #333;
        }
        .stat-item { text-align: center; }
        .stat-value { font-size: 1.2rem; font-weight: bold; color: #f0b90b; }
        .stat-label { font-size: 0.7rem; color: #888; text-transform: uppercase; }

        /* K線圖區域 */
        #chart-container {
            flex-grow: 1;
            position: relative;
            background: var(--bg-color);
            margin: 10px 0;
        }
        canvas { width: 100%; height: 100%; }

        /* 幽默對話框 */
        #toast {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            padding: 10px 20px;
            border-radius: 20px;
            font-weight: bold;
            display: none;
            z-index: 10;
            white-space: nowrap;
        }

        /* 按鈕區 */
        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
            padding: 20px;
            padding-bottom: 40px;
            background: var(--card-bg);
        }
        button {
            border: none;
            padding: 15px;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: bold;
            color: white;
            transition: transform 0.1s;
        }
        button:active { transform: scale(0.95); }
        .btn-buy { background-color: var(--up-color); }
        .btn-sell { background-color: var(--down-color); }
        .btn-wait { background-color: #555; }

        /* 結束彈窗 */
        #overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="stat-item">
            <div class="stat-label">當前資產 (USDT)</div>
            <div id="usdt-display" class="stat-value">1000.00</div>
        </div>
        <div class="stat-item">
            <div class="stat-label">持有部位 (BTC)</div>
            <div id="btc-display" class="stat-value">0.0000</div>
        </div>
    </div>

    <div id="chart-container">
        <canvas id="candleChart"></canvas>
        <div id="toast"></div>
    </div>

    <div class="controls">
        <button class="btn-buy" onclick="handleAction('buy')">買入</button>
        <button class="btn-sell" onclick="handleAction('sell')">賣出</button>
        <button class="btn-wait" onclick="handleAction('wait')">觀望</button>
    </div>

    <div id="overlay">
        <h2 id="final-title">遊戲結束</h2>
        <p id="final-result" style="font-size: 1.5rem;"></p>
        <button onclick="location.reload()" style="background: #f0b90b; padding: 10px 40px; margin-top: 20px; color: #000;">再玩一次</button>
    </div>

<script>
    // 1. 模擬高波動數據 (這是一段模擬的極限行情)
    const generateData = () => {
        let data = [];
        let price = 60000 + Math.random() * 5000;
        for (let i = 0; i < 65; i++) {
            let open = price;
            let change = (Math.random() - 0.48) * 800; // 偏向波動
            let close = open + change;
            let high = Math.max(open, close) + Math.random() * 200;
            let low = Math.min(open, close) - Math.random() * 200;
            data.push({ open, close, high, low });
            price = close;
        }
        return data;
    };

    const marketData = generateData();
    let currentIndex = 10; // 初始顯示 10 根
    let usdt = 1000;
    let btc = 0;
    let lastEquity = 1000;

    const canvas = document.getElementById('candleChart');
    const ctx = canvas.getContext('2d');

    function resize() {
        canvas.width = canvas.parentElement.clientWidth;
        canvas.height = canvas.parentElement.clientHeight;
        drawChart();
    }
    window.addEventListener('resize', resize);
    setTimeout(resize, 100);

    function drawChart() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        const displayData = marketData.slice(0, currentIndex);
        const candleWidth = canvas.width / 25; // 顯示最近的 25 根
        const padding = 40;

        // 計算縮放
        const visibleData = marketData.slice(Math.max(0, currentIndex - 25), currentIndex);
        const minPrice = Math.min(...visibleData.map(d => d.low));
        const maxPrice = Math.max(...visibleData.map(d => d.high));
        const range = maxPrice - minPrice;

        visibleData.forEach((d, i) => {
            const x = i * candleWidth + 10;
            const getY = (p) => canvas.height - padding - ((p - minPrice) / range) * (canvas.height - padding * 2);

            // 繪製引線
            ctx.strokeStyle = d.close >= d.open ? '#00c087' : '#ff3b30';
            ctx.beginPath();
            ctx.moveTo(x + candleWidth/2, getY(d.high));
            ctx.lineTo(x + candleWidth/2, getY(d.low));
            ctx.stroke();

            // 繪製實體
            ctx.fillStyle = d.close >= d.open ? '#00c087' : '#ff3b30';
            const bodyTop = getY(Math.max(d.open, d.close));
            const bodyBottom = getY(Math.min(d.open, d.close));
            ctx.fillRect(x + 2, bodyTop, candleWidth - 4, Math.max(1, bodyBottom - bodyTop));
        });
    }

    function handleAction(type) {
        if (currentIndex >= marketData.length - 1) return;

        const currentPrice = marketData[currentIndex-1].close;

        if (type === 'buy') {
            if (usdt > 0) {
                btc = usdt / currentPrice;
                usdt = 0;
            }
        } else if (type === 'sell') {
            if (btc > 0) {
                usdt = btc * currentPrice;
                btc = 0;
            }
        }

        // 前進下一分鐘
        currentIndex++;
        updateDisplay();
        drawChart();
        checkMood();

        // 結束判斷
        if (currentIndex >= 60) {
            endGame();
        }
    }

    function updateDisplay() {
        const currentPrice = marketData[currentIndex-1].close;
        const totalEquity = usdt + (btc * currentPrice);
        document.getElementById('usdt-display').innerText = totalEquity.toFixed(2);
        document.getElementById('btc-display').innerText = btc.toFixed(4);
    }

    function checkMood() {
        const currentPrice = marketData[currentIndex-1].close;
        const totalEquity = usdt + (btc * currentPrice);
        const toast = document.getElementById('toast');
        
        if (totalEquity > lastEquity * 1.02) {
            showToast("幣圈女股神！🚀", "#00c087");
        } else if (totalEquity < lastEquity * 0.98) {
            showToast("要回去洗碗了...😭", "#ff3b30");
        }
        lastEquity = totalEquity;
    }

    function showToast(text, color) {
        const toast = document.getElementById('toast');
        toast.innerText = text;
        toast.style.backgroundColor = color;
        toast.style.display = 'block';
        setTimeout(() => { toast.style.display = 'none'; }, 800);
    }

    function endGame() {
        const currentPrice = marketData[currentIndex-1].close;
        const finalEquity = usdt + (btc * currentPrice);
        const profit = ((finalEquity - 1000) / 1000 * 100).toFixed(2);
        
        document.getElementById('overlay').style.display = 'flex';
        document.getElementById('final-title').innerText = profit >= 0 ? "恭喜獲利！" : "下課了...";
        document.getElementById('final-result').innerText = `總盈虧：${profit}%`;
    }

    // 初始化顯示
    updateDisplay();
</script>
</body>
</html>
